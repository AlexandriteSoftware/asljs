<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport"
					content="width=device-width, initial-scale=1">
		<title>ASLJS Components Test</title>
		<link rel="stylesheet"
				href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css">
		<link rel="stylesheet"
				href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
		<style>
			body {
				margin: 16px;
				font: 14px/1.4 sans-serif;
			}

			.page {
				display: grid;
				grid-template-columns: 320px 1fr;
				gap: 16px;
			}

			.component-list,
			.theme-select,
			.properties-area,
			.view-area,
			.html-area,
			.event-log,
			.demo-input,
			.demo-card {
				border: 1px solid #bbb;
			}

			.component-list {
				width: 100%;
			}

			.theme-select {
				width: 100%;
			}

			.content {
				display: grid;
				gap: 12px;
			}

			.properties-area {
				margin-top: 12px;
				min-height: 220px;
				padding: 8px;
				overflow: auto;
			}

			.header h2,
			.preview h3,
			.events h3,
			.sidebar h1 {
				margin: 0 0 8px;
			}

			.sidebar p,
			.header p {
				margin: 0 0 8px;
			}

			.view-area {
				min-height: 320px;
				padding: 12px;
				overflow: auto;
			}

			.html-area {
				margin: 0;
				min-height: 320px;
				padding: 12px;
				overflow: auto;
				white-space: pre-wrap;
				font-family: Consolas, "Courier New", monospace;
			}

			.preview-tabs {
				margin-bottom: 0;
			}

			.preview-pane {
				border-top: 0;
			}

			.event-log {
				margin: 0;
				min-height: 96px;
				padding: 8px;
				white-space: pre-wrap;
			}

			.demo-stack,
			.demo-grid {
				display: grid;
				gap: 12px;
			}

			.demo-row {
				display: flex;
				gap: 8px;
				flex-wrap: wrap;
			}

			.demo-input,
			.demo-card {
				padding: 8px;
			}

			.assisted-box {
				max-width: 32rem;
			}

			.file-box {
				min-height: 24rem;
			}

			@media (max-width: 800px) {
				.page {
					grid-template-columns: 1fr;
				}
			}
		</style>
		<script type="importmap">
			{
				"imports": {
					"@lit/reactive-element": "../node_modules/@lit/reactive-element/reactive-element.js",
					"@lit/reactive-element/": "../node_modules/@lit/reactive-element/",
					"lit": "../node_modules/lit/index.js",
					"lit/": "../node_modules/lit/",
					"lit-element": "../node_modules/lit-element/index.js",
					"lit-element/": "../node_modules/lit-element/",
					"lit-html": "../node_modules/lit-html/lit-html.js",
					"lit-html/": "../node_modules/lit-html/",
					"asljs-data-binding": "../node_modules/asljs-data-binding/dist/index.js",
					"asljs-eventful": "../node_modules/asljs-eventful/dist/index.js",
					"asljs-observable": "../node_modules/asljs-observable/dist/index.js"
				}
			}
		</script>
	</head>
	<body>
		<div class="page">
			<aside class="sidebar">
				<h1>ASLJS Components</h1>
				<p>Select a component to clear the preview area and recreate a live demo.</p>
				<label for="theme-select">Theme</label>
				<select id="theme-select"
							class="theme-select"
							aria-label="Theme selector">
					<option value="none">None</option>
					<option value="bootstrap" selected>Bootstrap</option>
				</select>
				<label for="component-list">Component list</label>
				<select id="component-list"
								class="component-list"
								aria-label="Component selector"></select>
				<div id="properties-area"
						 class="properties-area"
						 aria-label="Component properties"></div>
			</aside>

			<main class="content">
				<div class="panel">
					<section class="header">
						<h2 id="component-title">Component preview</h2>
						<p id="component-description">Select a component from the list to render it.</p>
					</section>

					<section class="preview">
						<h3>Preview</h3>
						<ul class="nav nav-tabs preview-tabs"
										id="preview-tabs"
										role="tablist">
							<li class="nav-item"
									role="presentation">
								<button class="nav-link active"
											type="button"
											id="preview-view-tab"
											data-bs-toggle="tab"
											data-bs-target="#preview-view-pane"
											role="tab"
											aria-controls="preview-view-pane"
											aria-selected="true">View</button>
							</li>
							<li class="nav-item"
									role="presentation">
								<button class="nav-link"
											type="button"
											id="preview-html-tab"
											data-bs-toggle="tab"
											data-bs-target="#preview-html-pane"
											role="tab"
											aria-controls="preview-html-pane"
											aria-selected="false">HTML</button>
							</li>
						</ul>
						<div class="tab-content">
							<div class="tab-pane fade show active"
									 id="preview-view-pane"
									 role="tabpanel"
									 aria-labelledby="preview-view-tab"
									 tabindex="0">
								<div id="view-area"
										 class="view-area preview-pane"></div>
							</div>
							<div class="tab-pane fade"
									 id="preview-html-pane"
									 role="tabpanel"
									 aria-labelledby="preview-html-tab"
									 tabindex="0">
								<pre id="html-area"
										 class="html-area preview-pane">Ready.</pre>
							</div>
						</div>
					</section>

					<section class="events">
						<h3>Event log</h3>
						<pre id="event-log"
								 class="event-log">Ready.</pre>
					</section>
				</div>
			</main>
		</div>

		<script type="module">
			import {
					AiChatModelDefinition,
					bindComponentPreviewModel,
					ButtonModelDefinition,
					createComponentPreviewModel,
					createAiChatModel,
					createBootstrapTheme,
					createImageFileHandler,
					createPdfFileHandler,
					createTextEditorFileHandler,
					createTextFileHandler,
					FileViewModelDefinition,
					KeyboardModelDefinition,
					LetterpadModelDefinition,
					ListModelDefinition,
					NumpadModelDefinition,
					SelectModelDefinition,
					setDefaultTheme,
					TextInputModelDefinition,
				} from './dist/index.js';
			import './dist/index.js';

			const componentList = document.querySelector('#component-list');
			const themeSelect = document.querySelector('#theme-select');
			const componentTitle = document.querySelector('#component-title');
			const componentDescription = document.querySelector('#component-description');
			const viewArea = document.querySelector('#view-area');
			const propertiesArea = document.querySelector('#properties-area');
			const htmlArea = document.querySelector('#html-area');
			const eventLog = document.querySelector('#event-log');

			let activePreviewBinding = null;

			const componentRegistry = [];

			registerComponent(
				'AiChat',
				'Custom element chat surface backed by an explicit AI chat model.',
				AiChatModelDefinition,
				() => {
					const shell = document.createElement('div');
					shell.className = 'demo-grid';

					const hint = document.createElement('div');
					hint.className = 'demo-card';
					hint.textContent = 'This preview uses a local model and no API key. Sending shows the missing-key path.';

					const chat = document.createElement('asljs-ai-chat');
					chat.className = 'demo-card';
					chat.style.minHeight = '28rem';

					const model = createAiChatModel();

					model.on('initialize', () => {
						if (model.messages.length === 0) {
							model.appendMessage(
								'assistant',
								'Preview mode is ready. Type a message and send to see the component state flow.');
						}
					});

					chat.model = model;
					chat.options = {
						provider: {
							getOpenAiApiKey: async () => '',
							getChatModel: async () => 'gpt-4.1-mini',
						},
						getRequestContext: () => ({
							preview: true,
						}),
						buildRequestInput: ({ prompt }) => [
							{ role: 'user',
								content: prompt },
						],
						missingKeyMessage: 'Preview mode has no API key configured.',
					};

					shell.append(hint, chat);
					return {
						root: shell,
						component: chat,
					};
				});

			registerComponent(
				'Button',
				'Base icon-plus-text button.',
				ButtonModelDefinition,
				() => {
					const button = document.createElement('asljs-button');
					button.icon = '<i class="bi bi-lightning-charge"></i>';
					button.text = 'Run';
					return {
						root: button,
						component: button,
					};
				});

			registerComponent(
				'List',
				'Template-driven list rendering with row bindings.',
				ListModelDefinition,
				() => {
					const list = document.createElement('asljs-list');
					const template = document.createElement('template');
					template.dataset.slot = 'item';
					template.innerHTML = `
						<div class="demo-card"
								 data-bind-text="item.title">
						</div>
					`;
					list.appendChild(template);
					list.items = [
						{ title: 'Alpha row' },
						{ title: 'Beta row' },
						{ title: 'Gamma row' },
					];
					return {
						root: list,
						component: list,
					};
				});

			registerComponent(
				'Select',
				'Select input with validation and option list rendering.',
				SelectModelDefinition,
				() => {
					const select = document.createElement('asljs-select');
					select.label = 'Theme';
					select.description = 'Choose one option.';
					select.items = [
						{ value: 'bootstrap', label: 'Bootstrap' },
						{ value: 'plain', label: 'Plain' },
					];
					select.value = 'bootstrap';
					return {
						root: select,
						component: select,
					};
				});

			registerComponent(
				'TextInput',
				'Text input with validation, status, and Bootstrap default template.',
				TextInputModelDefinition,
				() => {
					const input = document.createElement('asljs-text-input');
					input.label = 'Project name';
					input.description = 'At least 4 characters.';
					input.placeholder = 'Enter a name';
					input.value = 'ASLJS';
					input.validator = value =>
						value.trim().length < 4
							? 'Value must be at least 4 characters.'
							: null;
					return {
						root: input,
						component: input,
					};
				});

			registerComponent(
				'Numpad',
				'Numeric assisted input with filtered key events.',
				NumpadModelDefinition,
				() => createAssistedInputDemo('asljs-numpad', '0123456789.', '123'));

			registerComponent(
				'Keyboard',
				'Full on-screen keyboard with filtered key and submit events.',
				KeyboardModelDefinition,
				() => createAssistedInputDemo('asljs-keyboard', "abcdefghijklmnopqrstuvwxyz0123456789 .,'-", 'alex'));

			registerComponent(
				'Letterpad',
				'Alphabetic assisted input with collapse toggle.',
				LetterpadModelDefinition,
				() => createAssistedInputDemo('asljs-letterpad', 'abcdefghijklmnopqrstuvwxyz', 'trace'));

			registerComponent(
				'FileView',
				'Provider- and handler-driven file preview surface.',
				FileViewModelDefinition,
				() => {
					const shell = document.createElement('div');
					shell.className = 'demo-grid';

					const fileView = document.createElement('asljs-file');
					fileView.className = 'demo-card file-box';
					fileView.provider = {
						loadFile: async fileName => ({
							name: fileName,
							mimeType: 'text/plain',
							text: 'ASLJS file preview demo\n\nThis text comes from an in-memory provider.',
						}),
						saveText: async (_fileName, text) => {
							appendLog(`saveText -> ${JSON.stringify(text)}`);
						},
					};
					fileView.handlers = [
						createPdfFileHandler(),
						createImageFileHandler(),
						createTextEditorFileHandler(),
						createTextFileHandler(),
					];
					fileView.fileName = 'demo.txt';

					shell.appendChild(fileView);
					return {
						root: shell,
						component: fileView,
					};
				});

			componentRegistry.forEach((entry, index) => {
				const option = document.createElement('option');
				option.value = String(index);
				option.textContent = entry.name;
				componentList.appendChild(option);
			});

			componentList.addEventListener('change', () => {
				navigateToHashState(
					themeSelect.value,
					componentRegistry[Number(componentList.value)]?.name ?? componentRegistry[0].name);
			});

			themeSelect.addEventListener('change', () => {
				navigateToHashState(
					themeSelect.value,
					componentRegistry[Number(componentList.value || 0)]?.name ?? componentRegistry[0].name);
			});

			window.addEventListener('hashchange', () => {
				applyHashState();
			});

			applyInitialHashState();

			function renderComponent(entry) {
				componentTitle.textContent = entry.name;
				componentDescription.textContent = entry.description;
				eventLog.textContent = `Selected ${entry.name}. Theme: ${themeSelect.value}.`;
				activePreviewBinding?.dispose?.();
				activePreviewBinding = null;
				viewArea.replaceChildren();
				propertiesArea.replaceChildren();
				const preview = entry.create();
				const properties = document.createElement('asljs-properties');
				const model = createComponentPreviewModel(entry.definition, preview.component);

				properties.definition = entry.definition;
				properties.target = model;
				properties.theme = getSelectedTheme();

				activePreviewBinding = bindComponentPreviewModel(
					entry.definition,
					model,
					preview.component);

				viewArea.appendChild(preview.root);
				propertiesArea.appendChild(properties);
				void refreshHtmlPreview();
			}

			function applySelectedTheme() {
				setDefaultTheme(getSelectedTheme());
			}

			function applyInitialHashState() {
				const state =
					readHashState();

				if (state.hashMissing) {
					navigateToHashState(state.theme, state.componentName);
					return;
				}

				applyHashState();
			}

			function applyHashState() {
				const state =
					readHashState();
				const componentIndex =
					findComponentIndexByName(state.componentName);

				themeSelect.value = state.theme;
				componentList.value = String(componentIndex);
				applySelectedTheme();
				renderComponent(componentRegistry[componentIndex]);
			}

			function navigateToHashState(theme, componentName) {
				const params = new URLSearchParams();

				params.set('theme', normalizeTheme(theme));
				params.set('component', normalizeComponentName(componentName));

				const nextHash = `#${params.toString()}`;

				if (window.location.hash === nextHash) {
					applyHashState();
					return;
				}

				window.location.hash = nextHash;
			}

			function readHashState() {
				const hash =
					window.location.hash.startsWith('#')
						? window.location.hash.slice(1)
						: window.location.hash;
				const params =
					new URLSearchParams(hash);
				const theme =
					normalizeTheme(params.get('theme'));
				const componentName =
					normalizeComponentName(params.get('component'));

				return {
					hashMissing: hash === '',
					theme,
					componentName,
				};
			}

			function normalizeTheme(value) {
				return value === 'none'
					? 'none'
					: 'bootstrap';
			}

			function normalizeComponentName(value) {
				const entry =
					componentRegistry.find(component => component.name === value);

				return entry?.name ?? componentRegistry[0].name;
			}

			function findComponentIndexByName(name) {
				const index =
					componentRegistry.findIndex(component => component.name === name);

				return index >= 0
					? index
					: 0;
			}

			function registerComponent(name, description, definition, create) {
				componentRegistry.push({
					name,
					description,
					definition,
					create,
				});
			}

			function getSelectedTheme() {
				return themeSelect.value === 'bootstrap'
					? createBootstrapTheme()
					: null;
			}

			function createAssistedInputDemo(tagName, characters, initialValue) {
				const shell = document.createElement('div');
				shell.className = 'demo-stack';

				const input = document.createElement('input');
				input.className = 'demo-input';
				input.value = initialValue;
				input.placeholder = 'Selected keys appear here';

				const hint = document.createElement('div');
				hint.className = 'demo-card';
				hint.textContent = `Allowed characters: ${JSON.stringify(characters)}`;

				const assistedInput = document.createElement(tagName);
				assistedInput.className = 'assisted-box';
				assistedInput.characters = characters;

				assistedInput.addEventListener('key', event => {
					const { key } = event.detail;

					if (key === 'Backspace') {
						input.value = input.value.slice(0, -1);
					} else {
						input.value += key;
					}

					appendLog(`${tagName} key -> ${JSON.stringify(key)}`);
				});

				assistedInput.addEventListener('submit', () => {
					appendLog(`${tagName} submit -> ${JSON.stringify(input.value)}`);
				});

				shell.append(input, hint, assistedInput);
				return {
					root: shell,
					component: assistedInput,
				};
			}

			function appendLog(line) {
				const current = eventLog.textContent.trim();
				eventLog.textContent =
					current === '' || current === 'Ready.'
						? line
						: `${current}\n${line}`;
			}

			function formatPreviewHtml() {
				const lines =
					[...viewArea.childNodes]
						.flatMap(node => formatNode(node, 0));

				return lines.length === 0
					? 'Ready.'
					: lines.join('\n');
			}

			async function refreshHtmlPreview() {
				await settleRenderedElements(viewArea);
				htmlArea.textContent = formatPreviewHtml();
			}

			async function settleRenderedElements(root) {
				await Promise.resolve();

				const pending =
					[root, ...root.querySelectorAll('*')]
						.map(node => node.updateComplete)
						.filter(Boolean);

				if (pending.length > 0) {
					await Promise.allSettled(pending);
				}

				await Promise.resolve();
			}

			function formatNode(node, depth) {
				if (node.nodeType === Node.TEXT_NODE) {
					return formatTextNode(node, depth);
				}

				if (node.nodeType !== Node.ELEMENT_NODE) {
					return [];
				}

				const element = node;
				const indent = '  '.repeat(depth);
				const attributes = [...element.attributes]
					.map(attribute => ` ${attribute.name}="${attribute.value}"`)
					.join('');
				const opening = `${indent}<${element.tagName.toLowerCase()}${attributes}>`;
				const childLines =
					[...element.childNodes]
						.flatMap(child => formatNode(child, depth + 1));

				if (childLines.length === 0) {
					return [`${opening}</${element.tagName.toLowerCase()}>`];
				}

				return [
					opening,
					...childLines,
					`${indent}</${element.tagName.toLowerCase()}>`,
				];
			}

			function formatTextNode(node, depth) {
				const text =
					node.textContent
						.split('\n')
						.map(line => line.trim())
						.filter(Boolean);

				if (text.length === 0) {
					return [];
				}

				const indent = '  '.repeat(depth);
				return text.map(line => `${indent}${line}`);
			}
		</script>
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
	</body>
</html>
